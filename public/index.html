<!DOCTYPE html>
<html>

<head>

<title>URL Shortener</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
width:400px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
font-size:16px;
}

button{
background:#007BFF;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:20px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 URL Shortener</h2>

<input
id="urlInput"
placeholder="Enter your URL"
/>

<button onclick="shortenURL()">
Shorten URL
</button>

<div id="result"></div>

</div>

<script>

async function shortenURL(){

const originalUrl =
document.getElementById("urlInput").value;

if(!originalUrl){
alert("Enter URL");
return;
}

try{

const response = await fetch("/shorten",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
originalUrl
})

});

const data = await response.json();

document.getElementById("result").innerHTML =
`Short URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;

}catch(error){

alert("Server error");

}

}

</script>

</body>
</html>
